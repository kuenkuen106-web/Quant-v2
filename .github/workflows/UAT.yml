name: v2 UAT Backtest Loop
on:
  workflow_dispatch:
    inputs:
      start_day:
        description: '開始天數 (例如 600)'
        required: true
        default: '600'
      end_day:
        description: '結束天數 (例如 0)'
        required: true
        default: '0'

concurrency:
  group: git-push-group
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 讀取代碼 (Checkout)
        uses: actions/checkout@v4 

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 🌟 關鍵改裝：加入 Cache 機制，以後不用每次重新下載 200MB+ 數據
      - name: 💾 Cache market data
        uses: actions/cache@v3
        with:
          path: docs/UAT/market_data_cache.pkl
          key: ${{ runner.os }}-market-data-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-market-data-

      - name: 📦 安裝依賴工具
        run: pip install -r requirements.txt

      - name: 🚀 執行量化掃描 (大迴圈模式)
        env:
          DISCORD_BACKTEST_WEBHOOK_URL: ${{ secrets.DISCORD_BACKTEST_WEBHOOK_URL }}
          DISCORD_BACKTEST_SUMMARY_WEBHOOK: ${{ secrets.DISCORD_BACKTEST_SUMMARY_WEBHOOK }}
          START: ${{ github.event.inputs.start_day }}
          END: ${{ github.event.inputs.end_day }}
        run: |
          for (( i=$START; i>=$END; i-- ))
          do
            echo "⏰ 正在啟動時光機：回溯 $i 天..."
            export UAT_DAYS_AGO=$i
            python LHK_trading_script_backtest_v2.py
            sleep 3
          done

      - name: 💾 更新 Dashboard 網頁檔案與交易紀錄
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 🌟 關鍵改裝：強制將 cache 檔排除，確保 git 永遠不會嘗試 push 佢
          git rm -f docs/UAT/market_data_cache.pkl || echo "Cache file already removed"
          
          git add docs/
          git commit -m "Auto-update Backtest from $START to $END days ago" || echo "No changes to commit"
          git push
